    asserts: "Independent recompute reproduces provider _q*/_sq_q* exactly (15,351 cells, 0 mismatch)."
  - test_id: tests/data_infra/test_field_registry.py::TestLiveRegistry::test_statement_fields_approved_for_formal
    asserts: "income/balancesheet/cashflow statement variants resolve to status=approved at formal_validation."

notes: |
  No on-disk or pipeline change — registry coverage only. These variants flow
  through the identical max(ann_date, f_ann_date)-anchored quarter-canonical
  serving as the existing materialized provider bins. Registering them lets the
  formal factor-expansion candidates (accruals / cash-quality / gross-prof /
  EV-value / Piotroski / single-quarter growth) pass the field-dependency gate.
  EBITDA and fin_exp_int_exp were deliberately EXCLUDED by the coverage gate
  (3.3% and 0% non-null respectively) — see coverage_evidence.excluded_by_gate.
