# ── Construction (a CROSS-LEDGER materializer: forecast × income) ──
# pit_backend._materialize_forecast_growth: for each (code, day) the latest visible
# 业绩预告 midpoint (net_profit_min/max, 万元) for fiscal quarter Q, minus the visible
# cumulative income through Q-1 = the forecast's last single quarter; over the prior-year
# same single quarter (income_cum[FY-1,Q] - income_cum[FY-1,Q-1]).
#
# ── PIT / availability contract ──
# - BOTH forecast and income anchor on effective_date = strict next-open after disclosure (§3.2).
# - The income as-of lookup respects restatement timing: restatement canary 200/200 — the as-of
#   value is OLD the day before / NEW on the restatement effective_date (no lookahead).
# - CARRY: a step function recomputed at each forecast/income event. It carries the CURRENT latest
#   COMPUTABLE forecast with NO TTL; but when a newer visible forecast is NOT yet computable (its
#   required income not visible) it serves NaN — it does NOT stale-carry the prior (GPT R1 Blocker-1).
# - Predictive factors MUST additionally wrap the field in Ref(...,1) AND gate on non-null +
#   forecast recency. NO implicit forward-fill is permitted to chase 果仁 parity.
#
# ── Coverage (SPARSE forecast-issuer SUB-UNIVERSE) ──
# - ~1,927 stocks (2014) -> ~4,978 (2026); served NaN is MEANINGFUL (no forecast coverage OR a
#   latest forecast not strictly PIT-computable), NOT an error. Non-issuers (324) return no rows
#   (standard Qlib sub-universe behaviour; consumers reindex -> NaN).
#
# ── Validation vs 果仁 ──
# - raw-ledger (_validate_forecast_factor_vs_guorn.py): 38,252 holdings, median rel-err 4.4e-05,
#   93% within 1%, 98.5% sign.
# - full-market PROVIDER-READ at the EXACT decision date (_provider_read_audit_forecast.py;
#   provider build 20260623_004545, 5,229 stocks): 38,399 finite-served holdings match median
#   rel-err 4.37e-05 / 92.9% within 1% / 98.2% sign, PLUS a clean 2.2% NaN coverage gap (NaN where
#   the latest forecast is not strictly PIT-computable; tested NOT carry-recoverable —
#   exact_nan_ffill_within_1pct ~ 0 — a different reference-platform edge-case alignment).
# - pre-publish integrity: kline + every approved field (close/total_mv/n_income_sq_q0/net_mf_amount)
#   byte-identical staged↔live; only $forecast__np_q_yoy added on top.
#
