# Field-registry approval evidence (2026-06-25)
#
# Registers the 2 果仁 #59 Comp_Core_Quality earnings-STABILITY factors as new provider fields:
#   $roe_core_stab_12q  = STDEVQ(RoeCoreQ, 12)     — pop stdev of single-quarter core-profit ROE, trailing 12 report quarters
#   $sales_gr_stab_12q  = STDEVQ(SalesQGr%PY, 12)  — pop stdev of slot-aligned single-quarter revenue YoY growth
# DERIVED cross-quarter from the approved income + balancesheet + income_quarterly PIT ledgers (custom
# materializer _materialize_quality_stability). These are the 2 factors PROVEN (果仁 rung-6) to be the
# dominant cause of the #59 holdings-overlap gap: adding them lifts overlap 21.6%->35.9% (+14.3pp) and
# converges the event-driven backtest to 果仁 (annual 25.3->21.4% vs 22.56; vol 27.1->25.7 vs 26.71). A
# FORMAL 11-factor #59 StrategyCandidate (Phase D) needs them in the live provider — they were previously
# only in a deleted scoped deep-slot build.

