# Field-registry approval evidence (2026-06-14) — balancesheet q1 slots, D4a batch 2.
#
# Adds three more q1 (one-quarter-back) period-end snapshot slots of already-approved
# balance-sheet line items: $total_liab_q1, $total_cur_assets_q1, $inventories_q1. Same
# pit_backend period-end (_q*) snapshot derivation as the approved q0/q4 (and the batch-1
# q1 slots approved earlier today) — unregistered until now. Unlocks the leverage/liquidity
# D4a difference factors: DAD (Δ debt/assets, /total_assets_q1 + total_liab_q1), CURD
# (Δ current ratio, total_cur_assets_q1 / total_cur_liab_q1), QRD (Δ quick ratio,
# (total_cur_assets_q1 − inventories_q1) / total_cur_liab_q1).

approval_id: 2026-06-14_balancesheet_d4a_q1_slots_batch2_to_approved
date: 2026-06-14
dataset_id: balancesheet
source_endpoint: tushare.balancesheet
from_status: unregistered
to_status: approved
reviewer: henrydan111
related_pr: cicc-d4a-field-registration
related_findings_id: null

provider_build_id: "phase1_qfields_holdertrade_v2_20260624"
calendar_policy_id: frozen_20260227_system_build

fields:
  - $total_liab_q1
  - $total_cur_assets_q1
  - $inventories_q1

approval_scope:
  status: approved
  stages:
    sandbox_screening: true
    vectorized_screening: true
    formal_validation: true
    oos_test: true
    registry_publish: true

# Period-end balance-sheet snapshots, q1 slot. PIT-anchored on max(ann_date, f_ann_date) —
# IDENTICAL derivation + anchoring as the approved q0/q4 slots. Coverage over 2020-H2
# (600-name sample) == each field's approved q0 sibling: total_liab_q1 1.000,
# total_cur_assets_q1 0.984, inventories_q1 0.972. Predictive factors MUST wrap in Ref(...,1).
pit_contract:
  availability_column: ann_date
  knowable_at: disclosure_day
  expression_lag_required: true
  same_day_raw_usage_allowed: false
  provider_transform: period_end_q1_snapshot_from_balancesheet
