# Field-registry approval evidence (2026-07-03)
#
# ENUMERATION EXTENSION of three already-approved statement families (income / balancesheet /
# indicators) — 67 fields — driven by the 果仁 deployed-20 replication → factor-catalog integration
# wave (the 12 grn_* draft factors; see PROMPT_catalog_integration.md + DEPLOYED20_REPLICATION_REPORT.md
# under workspace/research/idea_sourcing/guorn/). No status transition: every field joins a dataset
# already `approved`; the same PIT anchoring (max(ann_date, f_ann_date), effective>disclosure STRICT)
# and the same single-quarter/visibility kernels apply.
#
# Slot-depth basis: q5..q7 single-quarter and level slots are materialized by the depth-9 provider
# (SLOT_DEPTH_DEFAULT=9; GPT §10 APPROVED 2026-06-30, publish gates m1/m2 passed 2026-07-01; the
# deeper-slot kernel is rung-6-validated bit-faithful to depth 16, median rel-err 0.0, n~2M).
#
# Value-level evidence (deployed-20 xlsx parities, 2026-07-02..03):
#   CoreProfit 6-leg (0-fill) — 建行@2014-01-08 0.0971 vs 果仁 0.0993 structure-exact; #8 panel penny
#   (medRel 0.0001, n=16351). ATO caliber-A (revenue+assets q0..q7) — #16 xlsx penny 0.0005/sp 0.983.
#   core_qoq_ttm (q0..q7 TTM legs) — #4 xlsx penny 0.0000/sp 0.945. ROETTMDiff weighted-equity
#   (eq q0..q5) — mapping-doc pinned caliber (0.22pp med). SharesAvgGr (total_share_q0..q7) — official
#   top-K 100/90/85. 真实负债资产率 (intan/r_and_d q0) — campaign penny, top-K 100%. EV legs
#   (bond_payable/minority_int/trad_asset q0) — gp_ev sp 0.981 (#4 xlsx). income_tax_sq (q0/q4) —
#   #4 probe 100% coverage; formula caliber per indicator_reference_auto (denominator |q0|).
#   profit_dedt_sq_q4 — same Phase-C kernel as the approved q0.

