    status: approved
    reason: "Tushare block_trade endpoint (大宗交易). Namespace-protected via $block_trade__* prefix. Promoted pending_review->approved 2026-06-04 (same batch): sparse-event coverage ~245 days/yr 2008+, value sanity clean (0 negative amounts, price/vol/amount ≥0). PIT: 大宗交易 reported day T -> Ref(...,1) + staleness handling."
    field_prefixes:
