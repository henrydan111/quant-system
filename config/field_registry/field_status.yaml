# Field-status registry for the Qlib provider.
#
# Every Qlib field ($field) referenced inside a factor expression is resolved
# to its owning dataset here, and the dataset's status controls which research
# stages may consume the field. Formal validation, OOS test, and registry
# publication refuse to consume any field whose effective status disallows
# them.
#
# Schema: schemas/field_status.schema.json
# Plan:   PR 5 of the 2026-05-26 freeze plan.

schema_version: 1

statuses:
  approved:
    description: "Fully reviewed; safe at every stage."
    allowed:
      sandbox_screening: true
      vectorized_screening: true
      formal_validation: true
      oos_test: true
      registry_publish: true

  pending_review:
    description: "Downloaded and structurally validated; anomaly review WIP. May be used for exploration but not for formal publication."
    allowed:
      sandbox_screening: true
      vectorized_screening: true
      formal_validation: false
      oos_test: false
      registry_publish: false

  quarantine:
    description: "Known-suspect or unreviewed. Blocked from every stage until promoted via the approval workflow under config/field_registry/approvals/."
    allowed:
      sandbox_screening: false
      vectorized_screening: false
      formal_validation: false
      oos_test: false
      registry_publish: false

  deprecated:
    description: "Field exists in the provider but should no longer be used in research."
    allowed:
      sandbox_screening: false
      vectorized_screening: false
      formal_validation: false
      oos_test: false
      registry_publish: false

# Unknown-field policy: behavior when a referenced field matches NO registered
# dataset. Conservative-fail at formal/oos/publish (per PR 5 amendment #7);
# warn in screening/sandbox so exploration is not blocked.
unknown_field_policy:
  sandbox_screening: warn
  vectorized_screening: warn
  formal_validation: fail
  oos_test: fail
  registry_publish: fail

approval_log_path: config/field_registry/field_approval_log.jsonl
approvals_dir: config/field_registry/approvals

# ─────────────────────────────────────────────────────────────────────────
# Dataset entries
#
# Each entry declares the dataset's status and EITHER:
#   * fields:         explicit Qlib expression names ("$open", "$pe_ttm", ...)
#   * field_prefixes: namespaced prefix that catches every column in the
#                     dataset (e.g. "$top_list__" matches "$top_list__close").
#
# A dataset may declare both — the resolver checks fields first, then prefixes.
# ─────────────────────────────────────────────────────────────────────────
datasets:
  market_daily:
    status: approved
    reason: "Canonical OHLCV from Tushare daily endpoint; fully validated and namespace-protected via the event-like-daily fix (project_state 2026-04-23)."
    fields:
      - $open
      - $close
      - $high
      - $low
      - $vol
      - $amount
      - $pre_close
      - $adj_factor
      - $pct_chg
      - $change

  daily_basic:
    status: approved
    reason: "Tushare daily_basic indicators (valuation + turnover ratios). Used pervasively in approved factor library."
    fields:
      - $pe
      - $pe_ttm
      - $pb
      - $ps
      - $ps_ttm
      - $dv_ratio
      - $dv_ttm
      - $total_share
      - $float_share
      - $free_share
      - $total_mv
      - $circ_mv
      - $turnover_rate
      - $turnover_rate_f
      - $volume_ratio

  pit_fundamentals:
    status: approved
    reason: "PIT-anchored fundamental fields produced by pit_backend (ann_date / max(ann_date, f_ann_date) visibility). Approved per CLAUDE.md §3 PIT contract."
    fields:
      - $pit_or_yoy
      - $pit_netprofit_yoy
      - $pit_q_op_qoq
      - $pit_q_sales_yoy
      - $pit_q_profit_yoy
      - $pit_q_dt_eps
      - $pit_eps_basic
      - $pit_total_revenue
      - $pit_n_income_attr_p
      - $pit_total_cogs
      - $pit_op_income
    field_prefixes:
      - $pit_

  # PR 9a (2026-05-27): the `indicators` family is materialized by
  # pit_backend._materialize_snapshot_dataset from Tushare fina_indicator_vip.
  # Per CLAUDE.md §3 the indicators family is PIT-anchored on ann_date and is
  # the same PIT pipeline that produces the curated $pit_* aliases. These
  # fields are the workhorse of the formal factor catalog (qual_*, grow_*,
  # lev_*, val_* — 30+ formal factors depend on them) and are equally PIT-safe
  # as the $pit_ prefix. Listed explicitly (not prefix-matched) because the
  # column names overlap canonical kline-bin-protected namespace and we want
  # the registry to fail-closed on any new indicators field that hasn't been
  # explicitly reviewed.
  indicators:
    status: approved
    reason: "Tushare fina_indicator_vip snapshot fields (profitability, leverage, growth, per-share). PIT-anchored on ann_date per CLAUDE.md §3. Approved 2026-05-27 by PR 9a — see config/field_registry/approvals/2026-05-27_indicators_unlisted_to_approved.yaml for the formal-factor catalog references that drove this promotion."
    fields:
      # Profitability
      - $roe
      - $roa
      - $roic
      - $grossprofit_margin
      - $netprofit_margin
      - $assets_turn
      # Per-share metrics
      - $ocfps
      - $bps
      - $eps
      # Leverage / solvency
      - $debt_to_assets
      - $current_ratio
      - $quick_ratio
      # Growth (YoY / QoQ on indicator snapshot — distinct from $pit_*
      # quarter-derived aliases; both PIT-anchored, both approved)
      - $netprofit_yoy
      - $or_yoy
      - $op_yoy
      - $basic_eps_yoy
      - $roe_yoy
      - $q_op_qoq
      # Added 2026-05-29 (loader phase 2): same fina_indicator_vip family,
      # PARITY-VERIFIED equal to the provider $field (incl. the single-quarter
      # q_roe/q_dt_roe). Needed by the sanctioned pit_research_loader, which
      # (post-PR-18 fail-closed governance) refused them while unregistered.
      # See approvals/2026-05-29_indicators_loader_qfields.yaml.
      - $roe_waa
      - $roe_dt
      - $q_roe
      - $q_dt_roe
      - $dt_netprofit_yoy
      # Wave-2 (2026-05-31): margin-ladder ratios from fina_indicator_vip. Same
      # ann_date-anchored indicators family + pipeline as the fields above;
      # coverage 98-99.9% on 2018 full market; loader-servable (in the indicators
      # ledger). Unlocks qual_margin_{op_of_gr,ebit_of_gr,profit_to_gr}.
      # See approvals/2026-05-31_wave2_indicator_ratios.yaml.
      - $op_of_gr
      - $ebit_of_gr
      - $profit_to_gr

  reference:
    status: approved
    reason: "Reference panels: industry membership (SW2021), suspension ranges, ST flags. Sourced from canonical files in data/reference/."
    fields:
      - $industry
      - $sw2021_l1
      - $sw2021_l2
      - $is_st

  # ─── Quarantined: downloaded but pending anomaly review ──────────────
  # PR 9a (2026-05-27): the moneyflow / hk_hold / margin_detail / stk_holdertrade
  # endpoints write their numeric payload columns into Qlib with BARE names
  # (not namespaced), because they are NOT in EVENT_LIKE_DAILY_DATASETS — only
  # top_list / top_inst / block_trade / cyq_perf carry the `{dataset}__{col}`
  # prefix. Pre-PR-9a these datasets declared `field_prefixes: [$moneyflow_, …]`
  # that matched NOTHING actually in the provider, so the formal-stage gate
  # caught the factors via the conservative unknown_field policy rather than
  # via an explicit quarantine. PR 9a switches each to an explicit `fields:`
  # list so the diagnostic at formal stages names the dataset cleanly.
  moneyflow:
    status: quarantine
    reason: "Tushare moneyflow endpoint (institutional / retail capital flow); downloaded but pending anomaly review before production publish (project_state 2026-05-26)."
    fields:
      - $net_mf_amount
      - $net_mf_vol
      - $buy_sm_vol
      - $buy_sm_amount
      - $sell_sm_vol
      - $sell_sm_amount
      - $buy_md_vol
      - $buy_md_amount
      - $sell_md_vol
      - $sell_md_amount
      - $buy_lg_vol
      - $buy_lg_amount
      - $sell_lg_vol
      - $sell_lg_amount
      - $buy_elg_vol
      - $buy_elg_amount
      - $sell_elg_vol
      - $sell_elg_amount

  hk_hold:
    status: quarantine
    reason: "Northbound holdings (hk_hold endpoint); downloaded but pending anomaly review. The `$ratio` field is the foreign-holding ratio column from Tushare hk_hold."
    fields:
      - $ratio

  margin_detail:
    status: quarantine
    reason: "Margin trading detail (margin_detail endpoint); downloaded but pending anomaly review. Field names are bare (no `$margin_` prefix) because margin_detail is not in EVENT_LIKE_DAILY_DATASETS."
    fields:
      - $rzye
      - $rqye
      - $rzmre
      - $rzche
      - $rzrqye
      - $rqmcl
      - $rqchl

  stk_limit:
    status: quarantine
    reason: "Stock limit-up/limit-down price (stk_limit endpoint); downloaded but pending anomaly review. Note: limit detection in backtester uses $pct_chg, not these fields."
    fields:
      - $up_limit
      - $down_limit

  # PR 9a (2026-05-27): stk_holdertrade is an alpha endpoint bootstrapped
  # 2026-04-15/16 alongside top_list/top_inst/block_trade/cyq_perf. Unlike
  # the others it has a custom aggregator (`_materialize_stk_holdertrade`)
  # that emits BARE column names rather than the `{dataset}__{col}` prefix.
  # Same `pending_review` status as its sibling alpha endpoints.
  stk_holdertrade:
    status: pending_review
    reason: "Tushare stk_holdertrade aggregator (`_materialize_stk_holdertrade`). Emits bare-named summary columns. Anomaly review WIP — same gating as the other alpha endpoints."
    fields:
      - $holdertrade_net_vol
      - $holdertrade_gross_vol
      - $holdertrade_net_ratio
      - $holdertrade_events

  # ─── Pending review: event-like daily endpoints (post-2026-04-20 namespacing) ──
  top_list:
    status: pending_review
    reason: "Tushare top_list endpoint (龙虎榜). Namespace-protected via $top_list__* prefix per PR 4 (2026-04-20). Anomaly review WIP."
    field_prefixes:
      - $top_list__

  top_inst:
    status: pending_review
    reason: "Tushare top_inst endpoint (机构席位). Namespace-protected via $top_inst__* prefix. Anomaly review WIP."
    field_prefixes:
      - $top_inst__

  block_trade:
    status: pending_review
    reason: "Tushare block_trade endpoint (大宗交易). Namespace-protected via $block_trade__* prefix. Anomaly review WIP."
    field_prefixes:
      - $block_trade__

  cyq_perf:
    status: pending_review
    reason: "Tushare cyq_perf endpoint (筹码分布). Namespace-protected via $cyq_perf__* prefix. Anomaly review WIP."
    field_prefixes:
      - $cyq_perf__

  # ─── Approved: statement line-items (Wave-1 promotion 2026-05-31) ────────────
  # The income / balancesheet / cashflow STATEMENT FAMILIES anchor visibility on
  # max(ann_date, f_ann_date) (CLAUDE.md §3) — distinct from the indicators
  # family's ann_date-only anchor. These single-quarter (_sq_q*) and snapshot
  # (_q*) variants are produced by the staged PIT backend's quarter-canonical
  # serving and flow through the SAME disclosure-anchored pipeline as the
  # already-approved indicators/$pit_* fields. Promoted after:
  #   (1) live coverage audit — every listed field ≥ 50% non-null on 2018 full
  #       market (worst: goodwill 56.6%, lt_borr 53.8%; core 96-99.9%);
  #   (2) live loader↔provider parity (lag-0 + lag-1) — see
  #       tests/data_infra/test_pit_loader_provider_parity.py.
  # Fields are listed EXPLICITLY (not prefix-matched) so the registry fails
  # closed on any new unreviewed statement variant — same discipline as the
  # indicators entry. Evidence + binding:
  #   config/field_registry/approvals/2026-05-31_statements_unknown_to_approved.yaml
  income:
    status: approved
    reason: "Tushare income statement line-items (single-quarter _sq_q* derived). PIT-anchored on max(ann_date, f_ann_date) per CLAUDE.md §3. Wave-1 promotion 2026-05-31 — coverage + live-provider parity verified. See approvals/2026-05-31_statements_unknown_to_approved.yaml."
