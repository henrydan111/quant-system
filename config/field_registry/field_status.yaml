  report_rc:
    status: approved
    reason: "Analyst-forecast (report_rc) event-flow primitives. Promoted quarantine->approved 2026-06-09 (config/field_registry/approvals/2026-06-09_report_rc_quarantine_to_approved.yaml); served by provider report_rc_incr_20260608. Materialized by pit_backend._materialize_report_rc_consensus from the report_rc PIT ledger; effective_date anchors on report_date+1 (strictly_next_open): a CONTEMPORANEOUS create_time (gap<=REPORT_RC_BACKFILL_GAP_DAYS=45 cal days) -> max(report_date,create_time); a bulk-backfill stamp (gap>45 — the 2022-05 stamp on 2010-2021 reports) OR missing create_time -> report_date+REPORT_RC_VENDOR_LAG_OPEN_DAYS(=2) open days. report_date+1 VALIDATED market-wide vs JoinQuant genuine-PIT 朝阳永续 consensus (REPORT_RC_PIT_ANCHOR_VALIDATION.md: level corr +0.997, broad per-date Spearman +0.94, holds small-cap+delisted; forecast-error parity reproduces 2015/2017 regime sign-flips with Tushare LESS accurate than the oracle = no lookahead). Evidence: ~2.1k-3.5k covered stocks/yr 2010-2026 (CAP-TILTED -> rank within-coverage + size-neutralize hard), value-sanity clean (eps_up/dn>=0, revision_count==up+dn on every event row, n_active 0-72, 0 negatives), test-covered byte-determinism. Fields: $report_rc__eps_up / $report_rc__eps_dn / $report_rc__eps_revision_count / $report_rc__n_active_analysts. PIT: events anchored at report_date+1 (effective_date); predictive factors MUST additionally wrap every field in Ref(...,1). OUTSTANDING (recorded in the approval YAML, NOT discharged): the breadth restatement canary (2026-06-15) is a HARD gate before the eps_diffusion sealed-OOS — a FAIL re-quarantines."
