# Field-status registry for the Qlib provider.
#
# Every Qlib field ($field) referenced inside a factor expression is resolved
# to its owning dataset here, and the dataset's status controls which research
# stages may consume the field. Formal validation, OOS test, and registry
# publication refuse to consume any field whose effective status disallows
# them.
#
# Schema: schemas/field_status.schema.json
# Plan:   PR 5 of the 2026-05-26 freeze plan.

schema_version: 1

statuses:
  approved:
    description: "Fully reviewed; safe at every stage."
    allowed:
      sandbox_screening: true
      vectorized_screening: true
      formal_validation: true
      oos_test: true
      registry_publish: true

  pending_review:
    description: "Downloaded and structurally validated; anomaly review WIP. May be used for exploration but not for formal publication."
    allowed:
      sandbox_screening: true
      vectorized_screening: true
      formal_validation: false
      oos_test: false
      registry_publish: false

  quarantine:
    description: "Known-suspect or unreviewed. Blocked from every stage until promoted via the approval workflow under config/field_registry/approvals/."
    allowed:
      sandbox_screening: false
      vectorized_screening: false
      formal_validation: false
      oos_test: false
      registry_publish: false

  deprecated:
    description: "Field exists in the provider but should no longer be used in research."
    allowed:
      sandbox_screening: false
      vectorized_screening: false
      formal_validation: false
      oos_test: false
      registry_publish: false

# Unknown-field policy: behavior when a referenced field matches NO registered
# dataset. Conservative-fail at formal/oos/publish (per PR 5 amendment #7);
# warn in screening/sandbox so exploration is not blocked.
unknown_field_policy:
  sandbox_screening: warn
  vectorized_screening: warn
  formal_validation: fail
  oos_test: fail
  registry_publish: fail

approval_log_path: config/field_registry/field_approval_log.jsonl
approvals_dir: config/field_registry/approvals

# ─────────────────────────────────────────────────────────────────────────
# Dataset entries
#
# Each entry declares the dataset's status and EITHER:
#   * fields:         explicit Qlib expression names ("$open", "$pe_ttm", ...)
#   * field_prefixes: namespaced prefix that catches every column in the
#                     dataset (e.g. "$top_list__" matches "$top_list__close").
#
# A dataset may declare both — the resolver checks fields first, then prefixes.
# ─────────────────────────────────────────────────────────────────────────
datasets:
  market_daily:
    status: approved
    reason: "Canonical OHLCV from Tushare daily endpoint; fully validated and namespace-protected via the event-like-daily fix (project_state 2026-04-23)."
    fields:
      - $open
      - $close
      - $high
      - $low
      - $vol
      - $amount
      - $pre_close
      - $adj_factor
      - $pct_chg
      - $change

  daily_basic:
    status: approved
    reason: "Tushare daily_basic indicators (valuation + turnover ratios). Used pervasively in approved factor library."
    fields:
      - $pe
      - $pe_ttm
      - $pb
      - $ps
      - $ps_ttm
      - $dv_ratio
      - $dv_ttm
      - $total_share
      - $float_share
      - $free_share
      - $total_mv
      - $circ_mv
      - $turnover_rate
      - $turnover_rate_f
      - $volume_ratio

  pit_fundamentals:
    status: approved
    reason: "PIT-anchored fundamental fields produced by pit_backend (ann_date / max(ann_date, f_ann_date) visibility). Approved per CLAUDE.md §3 PIT contract."
    fields:
      - $pit_or_yoy
      - $pit_netprofit_yoy
      - $pit_q_op_qoq
      - $pit_q_sales_yoy
      - $pit_q_profit_yoy
      - $pit_q_dt_eps
      - $pit_eps_basic
      - $pit_total_revenue
      - $pit_n_income_attr_p
      - $pit_total_cogs
      - $pit_op_income
    field_prefixes:
      - $pit_

  # PR 9a (2026-05-27): the `indicators` family is materialized by
  # pit_backend._materialize_snapshot_dataset from Tushare fina_indicator_vip.
  # Per CLAUDE.md §3 the indicators family is PIT-anchored on ann_date and is
  # the same PIT pipeline that produces the curated $pit_* aliases. These
  # fields are the workhorse of the formal factor catalog (qual_*, grow_*,
  # lev_*, val_* — 30+ formal factors depend on them) and are equally PIT-safe
  # as the $pit_ prefix. Listed explicitly (not prefix-matched) because the
  # column names overlap canonical kline-bin-protected namespace and we want
  # the registry to fail-closed on any new indicators field that hasn't been
  # explicitly reviewed.
  indicators:
    status: approved
    reason: "Tushare fina_indicator_vip snapshot fields (profitability, leverage, growth, per-share). PIT-anchored on ann_date per CLAUDE.md §3. Approved 2026-05-27 by PR 9a — see config/field_registry/approvals/2026-05-27_indicators_unlisted_to_approved.yaml for the formal-factor catalog references that drove this promotion."
    fields:
      # Profitability
      - $roe
      - $roa
      - $roic
      - $grossprofit_margin
      - $netprofit_margin
      - $assets_turn
      # Per-share metrics
      - $ocfps
      - $bps
      - $eps
      # Leverage / solvency
      - $debt_to_assets
      - $current_ratio
      - $quick_ratio
      # Growth (YoY / QoQ on indicator snapshot — distinct from $pit_*
      # quarter-derived aliases; both PIT-anchored, both approved)
      - $netprofit_yoy
      - $or_yoy
      - $op_yoy
      - $basic_eps_yoy
      - $roe_yoy
      - $q_op_qoq
      # Added 2026-05-29 (loader phase 2): same fina_indicator_vip family,
      # PARITY-VERIFIED equal to the provider $field (incl. the single-quarter
      # q_roe/q_dt_roe). Needed by the sanctioned pit_research_loader, which
      # (post-PR-18 fail-closed governance) refused them while unregistered.
      # See approvals/2026-05-29_indicators_loader_qfields.yaml.
      - $roe_waa
      - $roe_dt
      - $q_roe
      - $q_dt_roe
      - $dt_netprofit_yoy
      # Wave-2 (2026-05-31): margin-ladder ratios from fina_indicator_vip. Same
      # ann_date-anchored indicators family + pipeline as the fields above;
      # coverage 98-99.9% on 2018 full market; loader-servable (in the indicators
      # ledger). Unlocks qual_margin_{op_of_gr,ebit_of_gr,profit_to_gr}.
      # See approvals/2026-05-31_wave2_indicator_ratios.yaml.
      - $op_of_gr
      - $ebit_of_gr
      - $profit_to_gr
      # Wave-3 (2026-06-09): 33 level indicators added after re-fetching
      # fina_indicator_vip with the FULL 167-field set (field-parity audit found 58
      # non-default fields were dropped because no `fields=` was passed). Materialized
      # into provider build indicators_fields_20260609. Same ann_date-anchored
      # fina_indicator_vip family + pipeline as the fields above. The 25 q_* single-
      # quarter fields were INTENTIONALLY NOT added (we self-compute PIT-correct
      # pit_* equivalents; the vendor q_* are not guaranteed PIT-safe). Coverage
      # 45-99% (debt/coverage ratios are undefined for net-cash/financial firms →
      # sub-universe factors, not a data defect). Predictive factors MUST Ref(...,1).
      # See approvals/2026-06-09_indicators_level_indicators.yaml.
      # turnover / efficiency
      - $arturn_days
      - $inv_turn
      - $invturn_days
      - $total_fa_trun
      # solvency / coverage
      - $cash_to_liqdebt
      - $cash_to_liqdebt_withinterest
      - $ebit_to_interest
      - $ebitda_to_debt
      - $longdebt_to_workingcapital
      - $ocf_to_interestdebt
      - $ocf_to_netdebt
      - $op_to_debt
      - $op_to_liqdebt
      # cash quality
      - $ocf_to_opincome
      - $ocf_to_or
      - $ocf_to_profit
      - $salescash_to_or
      # profitability structure / quality
      - $dtprofit_to_profit
      - $investincome_of_ebt
      - $n_op_profit_of_ebt
      - $nop_to_ebt
      - $op_to_ebt
      - $opincome_of_ebt
      - $roe_avg
      - $roic_yearly
      - $tax_to_ebt
      # other / niche
      - $capitalized_to_da
      - $daa
      - $interst_income
      - $non_op_profit
      - $profit_prefin_exp
      - $rd_exp
      - $valuechange_income
      # Phase-C (2026-06-24): single-quarter 扣非净利润 DERIVED from the indicators
      # CUMULATIVE profit_dedt (derive_single_quarter_value). PIT-correct replacement for
      # the unregistered vendor q_dtprofit_to_profit. coverage_tier=sub. q1..q4 stay
      # unregistered until a factor needs them. See approvals/2026-06-24_profit_dedt_sq_to_approved.yaml.
      - $profit_dedt_sq_q0

  reference:
    status: approved
    reason: "Reference panels: industry membership (SW2021), suspension ranges, ST flags. Sourced from canonical files in data/reference/."
    fields:
      - $industry
      - $sw2021_l1
      - $sw2021_l2
      - $is_st

  # ─── Quarantined: downloaded but pending anomaly review ──────────────
  # PR 9a (2026-05-27): the moneyflow / hk_hold / margin_detail / stk_holdertrade
  # endpoints write their numeric payload columns into Qlib with BARE names
  # (not namespaced), because they are NOT in EVENT_LIKE_DAILY_DATASETS — only
  # top_list / top_inst / block_trade / cyq_perf carry the `{dataset}__{col}`
  # prefix. Pre-PR-9a these datasets declared `field_prefixes: [$moneyflow_, …]`
  # that matched NOTHING actually in the provider, so the formal-stage gate
  # caught the factors via the conservative unknown_field policy rather than
  # via an explicit quarantine. PR 9a switches each to an explicit `fields:`
  # list so the diagnostic at formal stages names the dataset cleanly.
  moneyflow:
    status: approved
    reason: "Tushare moneyflow endpoint (18 individual-stock capital-flow fields). Promoted quarantine->approved 2026-06-04 (config/field_registry/approvals/2026-06-04_moneyflow_quarantine_to_approved.yaml): full coverage from 2014 (2008 partial 31.5%), clean value sanity (0 negative components, balanced turnover Sum(buy)~Sum(sell) corr 0.99998), provider parity 0 mismatches. CAVEAT: $net_mf_amount/$net_mf_vol are OPAQUE vendor nets (do NOT reconcile from the component columns; best corr ~0.51/0.55 to the main-force net) -> factors should prefer component-derived signals (e.g. (buy_lg+elg - sell_lg+elg)/turnover). PIT: same-day daily OUTCOME (trade_date anchor, knowable at session close T) -> predictive factors MUST wrap every field in Ref(...,1), enforced by the factor-library PIT-safety lint."
    fields:
      - $net_mf_amount
      - $net_mf_vol
      - $buy_sm_vol
      - $buy_sm_amount
      - $sell_sm_vol
      - $sell_sm_amount
      - $buy_md_vol
      - $buy_md_amount
      - $sell_md_vol
      - $sell_md_amount
      - $buy_lg_vol
      - $buy_lg_amount
      - $sell_lg_vol
      - $sell_lg_amount
      - $buy_elg_vol
      - $buy_elg_amount
      - $sell_elg_vol
      - $sell_elg_amount

  hk_hold:
    status: approved
    reason: "Northbound foreign-holding ratio ($ratio) + holding volume ($north_hold_vol), hk_hold endpoint. $ratio promoted quarantine->approved 2026-06-05 (approvals/2026-06-05_hk_hold_quarantine_to_approved.yaml). The raw mixes northbound A-share rows (exchange=SH/SZ, the wanted data) with southbound HK rows (exchange=HK); the staged backend filters to A-share ts_codes so the served fields are A-share-only (the earlier .HK 'contamination' flag was a mis-read of legitimate southbound rows). Served clean + parity-verified 2017-2025. PIT: end-of-day fact -> wrap fields in Ref(...,1). 2026-06-20: $north_hold_vol (持股数量/holding shares; raw `vol` renamed via NORTHBOUND_RENAMES so it does not shadow kline $vol; bin already materialized) registered approved (approvals/2026-06-20_north_hold_vol_to_approved.yaml) for the CICC E1g VWAP-based holding-VALUE factors. CORRECTION (doc 188): $ratio is % of ISSUED shares (占已发行股份百分比), NOT free-float — close to but not exact to CICC's 流通股本 wording. Daily northbound stopped 2024-08-20 (quarterly after); daily series effectively 2017..2024-08."
    fields:
      - $ratio
      - $north_hold_vol

  margin_detail:
    status: approved
    reason: "Margin trading detail (margin_detail endpoint), bare names (not EVENT_LIKE). PARTIAL promotion quarantine->approved 2026-06-04 (approvals/2026-06-04_margin_detail_partial_to_approved.yaml; review: diag_daily_dense_review.py): the 5 BALANCE/BUY fields ($rzye 融资余额, $rqye 融券余额, $rzmre 融资买入额, $rzrqye 融资融券余额, $rqmcl 融券卖出量) are clean — coverage 99.8-100% from 2010, 0 negative rows. The 2 REPAYMENT fields ($rzche, $rqchl) are HELD at quarantine (margin_detail_repayment entry) due to BSE-localized negatives (see below). PIT: exchange publishes day-T balances AFTER close (often next AM) -> predictive factors MUST use Ref(...,1) at minimum (treat as a T-disclosed-after-close outcome)."
    fields:
      - $rzye
      - $rqye
      - $rzmre
      - $rzrqye
      - $rqmcl

  margin_detail_repayment:
    status: quarantine
    reason: "Held repayment fields of the margin_detail endpoint ($rzche 融资偿还额, $rqchl 融券偿还量). HELD at quarantine 2026-06-04: the 2024 review (diag_daily_dense_review.py) found 28,127 ($rzche) + 799 ($rqchl) NEGATIVE rows, all localized to .BJ (Beijing Stock Exchange) names — a vendor data quirk (min rzche -2.0e8). Blocked from formal use until the BSE-negatives anomaly is explained/cleaned. The 5 clean margin balance/buy fields are approved (margin_detail entry)."
    fields:
      - $rzche
      - $rqchl

  stk_limit:
    status: approved
    reason: "Tushare stk_limit daily limit-up/limit-down prices. Promoted quarantine->approved 2026-06-02 (config/field_registry/approvals/2026-06-02_stk_limit_quarantine_to_approved.yaml): coverage verified full 2008-2026 (2024+ zero holes; pre-2022 holes are BSE-launch/IPO-window/legacy names handled by the engine's computed-band fallback) and values verified on regulatory tiers (>=99.79% on +/-5/10/20/30%; residual = no-limit sentinel rows [registration-system IPO no-limit days, up_limit~1e6/down_limit~0.01], the pre-2023 main-board IPO first-day +44%/-36% rule, and penny-stock fen-rounding -- all correct). EventDrivenBacktester uses $up_limit/$down_limit as the primary limit source via Exchange.resolve_limit_prices. These are execution fields knowable at session open (pre-determined from prior close), so no Ref lag is required."
    fields:
      - $up_limit
      - $down_limit

  limit_status:
    status: approved
    reason: "DERIVED tri-state limit-day flag (+1 close>=up_limit, -1 close<=down_limit, 0 normal, NaN suspended/no-limit), materialized in the provider build (PITBackend._materialize_derived_limit_status / shared compute_limit_status) from RAW $close vs RAW $up_limit/$down_limit and backfilled into the live provider 2026-06-17 (scripts/backfill_limit_status.py; future builds maintain it via the wired step). Basis-correct by construction (all three inputs raw, same day, half-fen tolerance) so no factor re-derives the raw/adjusted limit basis inline. Verified 2026-06-17: 5748 symbols, 0 misaligned, limit-day rate 2.69% (up 250929 / down 133585 / normal 13.9M); served through Qlib the definition holds 100% ($close>=$up_limit on every +1 row, $close<=$down_limit on every -1 row, 0 normal rows at a limit), value domain {-1,0,1,NaN}. Single certified source for limit-day exclusion across the price-volume factor wave (E1b 剔除涨跌停日 / mmt_off_limit). Same-day-CLOSE knowable (uses close, unlike session-open $up_limit/$down_limit) -> predictive factors MUST wrap in Ref(...,1). Approval: config/field_registry/approvals/2026-06-17_limit_status_derived_to_approved.yaml."
    fields:
      - $limit_status

  # PR 9a (2026-05-27): stk_holdertrade is an alpha endpoint bootstrapped
  # 2026-04-15/16 alongside top_list/top_inst/block_trade/cyq_perf. Unlike
  # the others it has a custom aggregator (`_materialize_stk_holdertrade`)
  # that emits BARE column names rather than the `{dataset}__{col}` prefix.
  # Same `pending_review` status as its sibling alpha endpoints.
  stk_holdertrade:
    status: approved
    reason: "Tushare stk_holdertrade aggregator (`_materialize_stk_holdertrade`). Emits bare-named summary columns. Promoted pending_review->approved 2026-06-04 (approvals/2026-06-04_alpha_endpoints_batch_to_approved.yaml; review: diag_sparse_event_review.py): 168,024 holder-event rows 2008-2026, in_de split DE 124,982 / IN 43,042 (sensible). PROPERLY PIT-anchored — the ledger carries ann_date + disclosure_date + effective_date (effective_date is the visibility anchor), unlike the daily endpoints. Still wrap in Ref(...,1) as hygiene + apply staleness/decay (sparse holder events). 2026-06-24: added 高管(holder_type=G,董监高) DIRECTIONAL per-day aggregates holdertrade_mgr_{in,de}_{vol,amount,events,ratio} (果仁-style 高管过去N日增持/减持 via NaN-skipping Sum(...,N)) via the testable module fn aggregate_directional_holdertrade; amount=Σ(|change_vol|·avg_price) over PRICED events only (min_count=1 -> all-unpriced day=NaN not 0; partial=lower bound; avg_price ~71% cov); vol/ratio/events complete. change_vol/change_ratio non-negative (data-audit canary: 0 negatives in 168,024 rows). Provider build phase1_qfields_holdertrade_v2_20260624. GPT R1(REVISE: amount false-zero)->R2 SHIP. approvals/2026-06-24_stk_holdertrade_mgr_directional_to_approved.yaml."
    fields:
      - $holdertrade_net_vol
      - $holdertrade_gross_vol
      - $holdertrade_net_ratio
      - $holdertrade_events
      # 2026-06-24: 高管(G) directional — 果仁-style 高管过去N日增持/减持 signals (Sum(...,N))
      - $holdertrade_mgr_in_vol
      - $holdertrade_mgr_in_amount
      - $holdertrade_mgr_in_ratio
      - $holdertrade_mgr_in_events
      - $holdertrade_mgr_de_vol
      - $holdertrade_mgr_de_amount
      - $holdertrade_mgr_de_ratio
      - $holdertrade_mgr_de_events

  # ─── Pending review: event-like daily endpoints (post-2026-04-20 namespacing) ──
  top_list:
    status: approved
    reason: "Tushare top_list endpoint (龙虎榜). Namespace-protected via $top_list__* prefix per PR 4 (2026-04-20). Promoted pending_review->approved 2026-06-04 (approvals/2026-06-04_alpha_endpoints_batch_to_approved.yaml; review: diag_sparse_event_review.py): sparse-event coverage ~245 event-days/yr 2014+, ~2000-3500 distinct stocks/yr, value sanity clean (net_amount ±2.3B, l_buy/l_sell ≥0). PIT: 龙虎榜 published after close T -> Ref(...,1) + explicit staleness/decay handling required (signal exists only on event days)."
    field_prefixes:
      - $top_list__

  top_inst:
    status: approved
    reason: "Tushare top_inst endpoint (机构席位). Namespace-protected via $top_inst__* prefix. Promoted pending_review->approved 2026-06-04 (same batch): sparse-event coverage ~245 days/yr 2012+, clean. CAVEAT: net_buy values are large-scale (institutional seat amounts) -> normalize (e.g. net_buy/turnover). PIT: Ref(...,1) + staleness handling."
    field_prefixes:
      - $top_inst__

  block_trade:
    status: approved
    reason: "Tushare block_trade endpoint (大宗交易). Namespace-protected via $block_trade__* prefix. Promoted pending_review->approved 2026-06-04 (same batch): sparse-event coverage ~245 days/yr 2008+, value sanity clean (0 negative amounts, price/vol/amount ≥0). PIT: 大宗交易 reported day T -> Ref(...,1) + staleness handling."
    field_prefixes:
      - $block_trade__

  cyq_perf:
    status: approved
    reason: "Tushare cyq_perf endpoint (筹码分布). Namespace-protected via $cyq_perf__* prefix. Promoted pending_review->approved 2026-06-04 (same batch): DAILY-DENSE (per-stock chip distribution) coverage 2018+ (~3400-5500 stocks/day), value sanity clean (cost percentiles 100% monotonic-ordered; winner_rate in [0,100], max 100.41 = negligible rounding). PIT: computed for day T -> Ref(...,1)."
    field_prefixes:
      - $cyq_perf__

  # ─── Quarantine: report_rc analyst-forecast event-flow primitives (P1, 2026-06-08) ──
  report_rc:
    status: approved
    reason: "Analyst-forecast (report_rc) event-flow primitives. Promoted quarantine->approved 2026-06-09 (config/field_registry/approvals/2026-06-09_report_rc_quarantine_to_approved.yaml); served by provider report_rc_incr_20260608. Materialized by pit_backend._materialize_report_rc_consensus from the report_rc PIT ledger; effective_date anchors on report_date+1 (strictly_next_open): a CONTEMPORANEOUS create_time (gap<=REPORT_RC_BACKFILL_GAP_DAYS=45 cal days) -> max(report_date,create_time); a bulk-backfill stamp (gap>45 — the 2022-05 stamp on 2010-2021 reports) OR missing create_time -> report_date+REPORT_RC_VENDOR_LAG_OPEN_DAYS(=2) open days. report_date+1 VALIDATED market-wide vs JoinQuant genuine-PIT 朝阳永续 consensus (REPORT_RC_PIT_ANCHOR_VALIDATION.md: level corr +0.997, broad per-date Spearman +0.94, holds small-cap+delisted; forecast-error parity reproduces 2015/2017 regime sign-flips with Tushare LESS accurate than the oracle = no lookahead). Evidence: ~2.1k-3.5k covered stocks/yr 2010-2026 (CAP-TILTED -> rank within-coverage + size-neutralize hard), value-sanity clean (eps_up/dn>=0, revision_count==up+dn on every event row, n_active 0-72, 0 negatives), test-covered byte-determinism. Fields: $report_rc__eps_up / $report_rc__eps_dn / $report_rc__eps_revision_count / $report_rc__n_active_analysts. PIT: events anchored at report_date+1 (effective_date); predictive factors MUST additionally wrap every field in Ref(...,1). CANARY DISCHARGED 2026-06-14/15 (verdict FAIL -> eps_diffusion factors revoked, report_rc FIELDS kept approved): the breadth restatement canary RAN (report_rc_backfill_canary.py, SNAP1 2026-06-07 vs SNAP2 2026-06-14) and did NOT pass the literal '0 backfilled + 0 drift' bar (138 genuine backfilled + 0 drift + 26 restatement) — but the backfill is ALREADY handled by the deployed create_time/+2-open-day provider anchor (validated no-lookahead by the buffer sweep + create_time p99=2cal), so the report_rc * FIELDS STAY approved (consensus level/count PIT validated market-wide; whole-family re-quarantine would be over-broad). Only the breadth second-difference (eps_diffusion) carried the residual (restatement not re-dated + suspiciously-high gross LS Sharpe 7.24) -> earn_eps_diffusion_60/_120 REVOKED approved->candidate (factor_registry, 2026-06-15). See the approval YAML outstanding_gate (status: discharged_fail) + project_state 2026-06-14/15."
    field_prefixes:
      - $report_rc__

  # ─── Approved: 业绩预告 (earnings-forecast) single-quarter net-profit YoY (rung-3, 2026-06-23) ──
  forecast:
    status: approved
    reason: "业绩预告 (company earnings-forecast) single-quarter net-profit YoY growth = the 果仁 业绩预告净利润QGr%PYQ_v1 factor. Materialized by pit_backend._materialize_forecast_growth (a CROSS-LEDGER materializer joining the forecast ledger with the income ledger), served by provider build 20260623_004545 (published 2026-06-23 by atomic swap; old provider backed up at data/qlib_data.bak_20260623_004545). CONSTRUCTION: the latest visible 业绩预告 midpoint (net_profit_min/max, 万元) for fiscal quarter Q minus the visible cumulative income through Q-1 = the forecast's last single quarter; over the prior-year same single quarter (income_cum[FY-1,Q]-income_cum[FY-1,Q-1]). PIT: BOTH the forecast and the income anchor on effective_date = strict next-open after disclosure (§3.2); the income as-of lookup respects restatement timing (restatement canary 200/200: as-of returns OLD before / NEW on the restatement effective_date — no lookahead). CARRY: a step function recomputed at each forecast/income event; it carries the CURRENT latest COMPUTABLE forecast with NO TTL, but when a newer visible forecast is NOT yet computable (its required income not visible) it serves NaN — it does NOT stale-carry the prior (GPT R1 Blocker-1). VALIDATION vs 果仁 (full-market provider-read at the EXACT decision date, _provider_read_audit_forecast.py): 38,399 finite-served holdings match median rel-err 4.37e-05 / 92.9% within 1% / 98.2% sign, plus a clean 2.2% NaN COVERAGE gap (NaN where the latest forecast is not strictly PIT-computable — NOT carry-recoverable; a different reference-platform edge-case alignment). COVERAGE: SPARSE forecast-issuer SUB-UNIVERSE only (~1,927 stocks 2014 -> ~4,978 2026); served NaN is MEANINGFUL (no forecast coverage OR latest-forecast-incomputable), NOT an error. Non-issuers return no rows (standard Qlib sub-universe; consumers reindex -> NaN). CONSUMER RULE: formal/predictive factors MUST wrap every field in Ref(...,1) AND gate on non-null + forecast recency; NO implicit forward-fill to chase 果仁 parity. GPT 5.5 Pro cross-review R1->R4 = SHIP (B1 stale-carry, M1 same-effective-date tie-break, M2 restatement canary + full-market provider-read, all folded). Approval: config/field_registry/approvals/2026-06-23_forecast_np_q_yoy_to_approved.yaml."
    fields:
      - $forecast__np_q_yoy

