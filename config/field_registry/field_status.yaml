      - $ebit_sq_q1
      - $ebit_sq_q2
      - $ebit_sq_q3
      - $n_income_attr_p_sq_q0
      - $n_income_attr_p_sq_q4
      - $n_income_sq_q0
      - $n_income_sq_q1
      - $n_income_sq_q2
      - $n_income_sq_q3
      - $oper_cost_sq_q0
      - $oper_cost_sq_q1
      - $oper_cost_sq_q2
      - $oper_cost_sq_q3
      - $oper_cost_sq_q4
      - $operate_profit_sq_q0
      - $operate_profit_sq_q4
      - $revenue_sq_q0
      - $revenue_sq_q4
      - $total_revenue_sq_q0
      - $total_revenue_sq_q1
      - $total_revenue_sq_q2
      - $total_revenue_sq_q3
      - $total_revenue_sq_q4

  balancesheet:
