# CICC price-volume handbook (系列7) — frozen replication cohort manifest v1 (roadmap Rev5 §9.1/§9.2)
#
# FROZEN governance artifact for Wave E1. Locked BEFORE any E1 batch registration so the cohort
# denominators, replication tiers, exclusion reasons, truth-table label window and OOS eligibility
# cannot be chosen AFTER seeing results (§9.2 anti-p-hacking). Loaded + sha-verified by
# replication_governance.load_cohort_manifest; the gate matches factors by catalog_factor_id.
#
# Source handbook: Knowledge/AI量化增强/CICC_价量因子定义.md (《中金量化多因子系列7价量因子手册》,
# 图表4/16/28/40/52/64/76/88/100). Test window 2010.01.04–2022.07.01 (CSI1000 from 2014.11.01),
# monthly, 10 groups, {univ_all, csi300, csi500, csi1000}.
#
# §9.3 OOS quarantine: the handbook已展示 2010–2022.07 表现 → doing parity OBSERVES that window,
# so a price-volume replicated factor's sealed OOS may not start before
# max(system_oos_start, handbook_label_window_end + horizon + embargo) ≈ 2022-07 + … → SHORT window.
# All rows oos_eligibility: short_window accordingly (north資金 = spent_same_family, see below).
#
# GRANULARITY (explicit, §11.1b not-silent): rows enumerate the FORMALIZATION-CANDIDATE factors at
# the handbook's natural granularity. Systematic vol_/liq_ families carry a `# ×3 {1M,3M,6M}` note;
# the per-window + per-factor catalog_factor_id linkage and the per-factor truth-table transcription
# are LAZY (§12.2) — added when a factor registers / claims exact_certified. The frozen content here
# is the candidate SET + tiers + required_operators + truth window + oos eligibility.
# DEDUP (§0): rank-equivalent duplicates of existing catalog factors (mmt_normal_M≈mom, basic
# vol_std≈risk_vol_*, basic liq_turn≈liq_turnover_*, basic north/flow ≈ north_*/flow_*) are NOT
# formalization candidates; the genuinely-new constructions (new operators / new fields) are.

