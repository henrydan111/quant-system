denominator_provenance:
  source: "CICC_价量因子定义.md per-category counts (图表4/16/28/40/52/64/76/88)"
  daily_replicability: "source − 融券-side (rqye/rqchl quarantine); estimated"
  formalization_candidate: "new-construction factors (new operator OR new field OR new combination) minus rank-equiv catalog dups; estimated, finalized per-factor at registration (§12.2)"
  exact_oos_eligible: "TRACKED downstream (exact_certified ∧ post-quarantine power floor); not frozen"
  sealed_attempt: "TRACKED downstream (attempts that spent sealed OOS); not frozen"

