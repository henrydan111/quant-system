# CICC fundamental handbook — frozen replication cohort manifest v2 (roadmap Rev5 §9.1/§9.2)
#
# ░░ v1 → v2 FIDELITY CORRECTION (factor-logic cross-review R3, 2026-06-14) ░░
# v1 (archive/cicc_fundamental_cohort_v1.yaml, sha 5d3f761498cbb36b) is preserved UNCHANGED as
# the original pre-results declaration. v2 supersedes it after GPT 5.5 Pro's factor-LOGIC review
# found that several D4a/D-COMP factors are NOT faithful CICC replications as built. Per the frozen
# contract ("revise by bumping to a new version file, never silently edit"), the corrections live
# here, NOT as an edit to v1. The DENOMINATORS are unchanged (no result was seen; this is a
# conservative fidelity DOWNGRADE, the opposite of p-hacking). source_cohort_id is unchanged so the
# ReplicationGovernanceRecords stay keyed to the same cohort. Changes vs v1:
#   * Profit (comp_cicc_profit): formula_equivalent_pending → proxy_approx — the composite mixes a
#       PIT-TTM CFOA with VENDOR cumulative-YTD ROE/ROIC (different time basis); exact TTM ROIC is
#       not cleanly buildable (handbook itself flags ROIC ⚠️ 需投入资本口径).
#   * ROED (qual_roed): → proxy_approx — uses INCL-minority equity + incl-minority NI; CICC ROE is
#       归母 (exc-minority). 归母 equity slots + 归母-NI single-quarter slots are unregistered.
#   * DTED (qual_dted): → proxy_approx — same 归母 vs incl-minority equity-basis deviation.
#   * QRD (qual_qrd): → proxy_approx — inventory-only quick ratio; CICC subtracts more (1年内到期
#       非流动资产 + 待摊费用 + 预付款), which have no registered q0/q1 slots.
#   * APRD (F_APRD): catalog_factor_id UNLINKED (qual_aprd REMOVED from the catalog) — the prior
#       qual_aprd computed payables-turnover Δ(营业成本TTM/应付账款), unrelated to the handbook's
#       accruals ratio (应计利润TTM/营业利润TTM). Faithful build needs operate_profit_sq q1-q3
#       (only q0/q4 registered) + a transcribed 应计利润 numerator → stays un-built.
# proxy_approx is a HARD candidate_ceiling cap (resolve_replication_ceiling): these stay drafts at
# candidate, never enter exact-tier CICC evaluation, until rebuilt faithfully (which removes the cap).
# The 6 mechanically-faithful D4a (CFOAD/ROAD/CCRD/CSRD/DAD/CURD) keep formula_equivalent_pending.
# ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░
