# CICC fundamental handbook — frozen replication cohort manifest (roadmap Rev5 §9.1/§9.2)
#
# FROZEN governance artifact. Locked BEFORE batch registration so the denominators,
# replication tiers, exclusion reasons, truth-table label window and OOS eligibility
# cannot be chosen after seeing results (§9.2 anti-p-hacking). Loaded + sha-verified by
# src/alpha_research/factor_registry/replication_governance.py::load_cohort_manifest.
# Any edit to the load-bearing content (source_cohort_id / handbook_label_window_end /
# denominators / factor_rows) changes manifest_sha and is detectable. To revise, bump to
# a new version file (…_v2.yaml) rather than silently editing — the frozen contract is
# that v1's denominators are what was declared before results.
#
# Source handbook: Knowledge/AI量化增强/CICC_基本面因子定义.md ("105 因子 + 7 复合").
# Truth observation: Phase-D batch evaluated the exact-tier factors against the handbook
# truth tables across 2010-2022 × {univ_all, csi300, csi500} (PHASE_D_ROUND1_REPORT.md),
# so every fundamental factor's univ_all/csi300/csi500 truth window is OBSERVED through
# 2022 → handbook_label_window_end below drives the §9.3 OOS quarantine.

source_cohort_id: cicc_fundamental_handbook_v1
manifest_sha: "5d3f761498cbb36b"          # pins the frozen content; load_cohort_manifest raises on mismatch (excl. catalog_factor_id linkage)
handbook_label_window_end: "2022-12-31"   # Phase-D observed 2010-2022; per-chart exact end refined at FactorReplicationCertification (§12.2 lazy)

# --- the five pre-frozen denominators (§9.2). The first three are FROZEN here; ---
# --- exact_oos_eligible / sealed_attempt are TRACKED downstream, never frozen.    ---
denominators:
  source: 112                  # authoritative: handbook header "105 因子 + 7 复合"
  daily_replicability: 95      # handbook feasibility summary ✅(~83 immediate) + ⚠(~12 constructible from existing statement fields: ROIC/OCFA/LPNP/EV2EBITDA-partial); EXCLUDES ❌ new-endpoint (Comp_opt/TOP_MANA_INCOME/IHN_diff/Ln_IH) + rating/holdings (RatingChange/TargetReturn/LHRD). ESTIMATED from the handbook ✅/⚠/❌ buckets — tighten at full per-row enumeration.
  formalization_candidate: 46  # = the 46 formalization-candidate factor_rows enumerated below (D5×18 + D-COMP×8 + D4a×10 + D4b×2 + D6×8), the fundamental factors we intend to bring to formal evaluation. Rank-equivalent dups (Ln_MC/BP_LR/DP/SP_TTM/CUR/QR/Debt_Asset/mmt_normal_M/OP_QOQ — already in catalog) and not-replicable (new-endpoint) factors are NOT formalization candidates.

# rows_enumerated: formalization_candidates_only — the full 112-row enumeration with
# per-row exclusion_reason is deferred (lazy, §12.2: transcribe a truth table only when a
# factor claims exact_certified). This is EXPLICIT, not a silent gap (§11.1b): the source /
# daily_replicability denominators above carry their provenance; the rows below are the
# frozen formalization-candidate set whose membership the sha pins.
denominator_provenance:
  source: "Knowledge/AI量化增强/CICC_基本面因子定义.md header (105 base + 7 composite)"
  daily_replicability: "handbook 复刻可行性汇总 ✅+⚠(existing-data) buckets; estimated"
  formalization_candidate: "enumerated factor_rows (tier != not_replicable) below"
  exact_oos_eligible: "TRACKED downstream (exact_certified ∧ post-quarantine power floor); not frozen"
  sealed_attempt: "TRACKED downstream (attempts that spent sealed OOS); not frozen"

