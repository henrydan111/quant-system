# Knowledge-source registry — the channels that feed research IDEAS into the
# knowledge layer. A "source" is either external literature (arXiv / OSAP /
# 券商研报 / journals / news) OR an internal data integration (report_rc, and
# every future Tushare/alt-data set you add) that yields research directions +
# curated value content. The dashboard 知识源 page renders one card per source;
# the 研究方向 / 价值内容 pages filter by the `source` id (data-cat).
#
# EXTENSIBLE — to add a data source: add an entry here (status: planned→active)
# and tag its directions in research_directions.yaml with `source_kind: <id>`
# (and, when it has its own content store, tag those rows `source: <id>`). The
# board then auto-shows its card + filter option. No dashboard code change.
#
# name/summary are authored BILINGUALLY here (infra metadata, few + static);
# the high-volume dynamic content (dimension labels / direction one-liners /
# paper glosses) is Sonnet-translated in translations.json.

meta:
  generated: "2026-06-10"
  note: "source ids must match research_directions.yaml `source_kind` (absent => arxiv) and any content store `source` tag."

