# Curated arXiv → A-share research directions — STRUCTURED single source of truth.
#
# Read by BOTH the dashboard knowledge layer (src/dashboard) AND the prose
# companion knowledge/TOP_DIRECTIONS.md. Keep them in sync: edit here, the
# dashboard reflects it on next build. EN structured fields here; the Chinese
# one-liner per direction is Sonnet-generated into translations.json
# (section `knowledge_directions`, keyed by id) so the board reads CN.
#
# A direction is a HYPOTHESIS, never evidence — any factor still runs the full
# IS-only -> sealed-OOS lifecycle + the size/industry-neutralized marginal-
# contribution test vs the catalog (CLAUDE.md §3.5, §7).

meta:
  generated: "2026-06-10"
  corpus: "arXiv q-fin themed harvest (671 papers)"
  ranked_source: "workspace/research/idea_sourcing/knowledge/ranked_papers.parquet"
  prose_companion: "workspace/research/idea_sourcing/knowledge/TOP_DIRECTIONS.md"

directions:
  - id: D1
    tier: 1
    title: "Capital Gains Overhang / disposition effect from chip-distribution"
    dimension: behavioral_chips
    status: FRONTIER_OPEN
    buildable: true
    top_pick: true
    source_arxiv: ["2505.20608"]
    source_note: "Replication of Reference-Dependent Preferences (Chinese market, 1995-2024); Grinblatt-Han (2005)"
    en: "Unrealized-gain overhang from cyq_perf cost basis predicts the cross-section; a new behavioral dimension."
    idea: "Disposition effect: a stock where most holders sit on unrealized gains faces less overhang selling pressure -> predictable continuation. Reference point = aggregate cost basis."
    fields: ["$cyq_perf__weight_avg", "$cyq_perf__winner_rate", "$cyq_perf__cost_50pct"]
    factor_expr: "(Ref($close,1) - Ref($cyq_perf__weight_avg,1)) / Ref($cyq_perf__weight_avg,1)"
    novelty: "Orthogonal — book has risk_/mom_/rev_/qual_ but no cost-basis/reference-price behavioral factor; cyq_perf used by zero factors."
    validation: "sandbox (2018-2021 IS) -> size/industry-neutralized marginal test vs catalog -> factor_lifecycle -> single-shot sealed-OOS"
    caveats: "cyq_perf coverage 2018+ (shorter IS); winner_rate bounded [0,100] (rank-transform); test base CGO->return before the risk interaction."

  - id: D2
    tier: 1
    title: "Informed order-flow imbalance from moneyflow"
    dimension: informed_flow
    status: FRONTIER_OPEN
    buildable: true
    top_pick: false
    source_arxiv: ["2603.20271", "2605.30672"]
    source_note: "Transfer Entropy Networks across investor types (Korea); Residual Supply & the Price of Risk Absorption"
    en: "Large/extra-large order net inflow proxies institutional/informed flow; the field doc itself suggests the form."
    idea: "Large/extra-large orders proxy institutional/informed flow; persistent net institutional buying predicts continuation, one-sided retail pressure predicts reversal."
    fields: ["$buy_lg_amount", "$buy_elg_amount", "$sell_lg_amount", "$sell_elg_amount", "$amount"]
    factor_expr: "Mean(Ref(($buy_lg_amount+$buy_elg_amount-$sell_lg_amount-$sell_elg_amount),1),20) / Mean(Ref($amount,1),20)"
    novelty: "Orthogonal — no flow/order-imbalance factor in the book. moneyflow approved, zero factors built."
    validation: "sandbox -> marginal test vs catalog -> factor_lifecycle -> sealed-OOS"
    caveats: "Same-day OUTCOME field -> MUST wrap every field in Ref(...,1). Daily flow noisy -> smooth 20d; short decay -> 5d rebalance. Avoid the opaque $net_mf_amount (does not reconcile)."

  - id: D3
    tier: 1
    title: "Earnings surprise / PEAD"
    dimension: earnings_events
    status: FRONTIER_OPEN
    buildable: true
    top_pick: false
    source_arxiv: ["2009.03094", "2604.13260"]
    source_note: "PEAD via GA-optimised supervised learning; Which Voices Move Markets? (SUE-controlled drift)"
    en: "Standardized unexpected earnings (SUE) drift — a robust anomaly not yet in our book; adjacent to eps_diffusion."
    idea: "Prices under-react to earnings news; SUE predicts drift over 1-3 months (PEAD). Build SUE from single-quarter earnings standardized by trailing dispersion, anchored on the disclosure date (PIT via ledger)."
    fields: ["$n_income_sq_q0", "$report_rc__* (consensus, partial)"]
    factor_expr: "SUE = z(YoY change in $n_income_sq_q0) ; drift factor, disclosure-date anchored"
    novelty: "Adjacent to earn_eps_diffusion (revision breadth) but a different signal — realized surprise + drift, not forecast revision."
    validation: "sandbox -> marginal test vs catalog (esp. vs eps_diffusion) -> factor_lifecycle -> sealed-OOS"
    caveats: "PEAD is well-known -> decay/crowding risk. Surprise-vs-consensus variant needs one more report_rc field (consensus EPS level) promoted; clean random-walk SUE is buildable now."

  - id: D4
    tier: 1
    title: "Northbound / foreign-flow positioning from hk_hold"
    dimension: ownership_holders
    status: FRONTIER_OPEN
    buildable: true
    top_pick: false
    source_arxiv: ["2504.07855", "2603.20271"]
    source_note: "Foreign Signal Radar; investor-type flow networks"
    en: "Change & acceleration of northbound (Stock-Connect) holdings — a relatively informed foreign clientele."
    idea: "Foreign Stock-Connect investors are a relatively informed clientele in A-shares; changes/acceleration of northbound holdings predict the cross-section."
    fields: ["$hk_hold__ratio (confirm served column)"]
    factor_expr: "north_hold_chg_20 = Ref($hk_hold__ratio,1) - Ref($hk_hold__ratio,21)  (+ level + acceleration)"
    novelty: "Orthogonal — no foreign-flow factor in the book. hk_hold approved, unmined."
    validation: "sandbox -> marginal test vs catalog -> factor_lifecycle -> sealed-OOS"
    caveats: "Northbound coverage skews to larger/connect-eligible names (sub-universe; size-neutralize). Confirm exact hk_hold served column first."

  - id: M1
    tier: 2
    title: "Empirical-Bayes / FDR factor selection (methodology)"
    dimension: factor_methodology
    status: METHOD
    buildable: true
    top_pick: false
    source_arxiv: ["2311.10685", "2303.13406"]
    source_note: "High-Throughput Asset Pricing (empirical Bayes); Sequential Cauchy Combination Test"
    en: "Empirical-Bayes shrinkage matches top-journal OOS while killing look-ahead bias — upgrade our screening/gates."
    idea: "EB-shrunk IC as a screening statistic attacks our factor-zoo multiple-testing problem (the risk that burned the 87 oos_informed_backfill candidates). Strengthen deflated-Sharpe / FDR control under correlated tests."
    fields: []
    factor_expr: "(methodology — not a factor) EB shrinkage on cross-sectional IC; sequential Cauchy / FDR for dependent tests"
    novelty: "Improves HOW we run the promotion gate + the marginal-contribution rule, not a new raw signal."
    validation: "fold into sandbox screening + the promotion-gate statistics; not a sealed-OOS factor."
    caveats: "Process change — validate it reproduces known verdicts before trusting it on new factors."

  - id: B1
    tier: 3
    title: "Earnings-call / filing-text sentiment (BLOCKED — top data target)"
    dimension: text_nlp
    status: FRONTIER_BLOCKED
    buildable: false
    top_pick: false
    source_arxiv: ["2604.13260"]
    source_note: "Which Voices Move Markets? (FinBERT section-weighted earnings-call sentiment, OOS IC 0.142, LS alpha 2.03% t=6.49)"
    en: "Speaker/section-weighted earnings-call sentiment — high alpha, but we have no transcript corpus yet."
    idea: "FinBERT section-weighted sentiment over earnings-call transcripts predicts post-earnings returns and subsumes dictionary methods."
    fields: []
    factor_expr: "(blocked) needs a Chinese earnings-call / 公告 text corpus + FinBERT-zh"
    novelty: "text_nlp is the single biggest blocked frontier (10 papers in the corpus). Highest-value data-acquisition target."
    validation: "data acquisition first (build the text pipeline), then the usual factor gauntlet."
    caveats: "No transcript/filing full-text ingested. Largest blocked frontier."

  - id: B2
    tier: 3
    title: "Customer / supply-chain momentum (BLOCKED — needs graph)"
    dimension: network_supplychain
    status: FRONTIER_BLOCKED
    buildable: false
    top_pick: false
    source_arxiv: ["2301.11394"]
    source_note: "Customer Momentum (Cohen-Frazzini lead-lag)"
    en: "A firm's return predicted by its customers' past returns — needs a customer-supplier graph we lack."
    idea: "Lead-lag: customer returns predict supplier returns. Partial proxy: SW-industry lead-lag momentum (buildable now, weaker)."
    fields: []
    factor_expr: "(blocked) needs Tushare 产业链 customer-supplier links; industry lead-lag is a partial proxy"
    novelty: "Network dimension. Paper notes post-discovery alpha decay."
    validation: "industry lead-lag proxy buildable now; true customer-supplier needs the graph."
    caveats: "No inter-firm graph ingested; alpha decays post-discovery."

  - id: S1
    tier: 4
    title: "China holiday / Spring-Festival seasonality (low-priority)"
    dimension: seasonality_calendar
    status: FRONTIER_OPEN
    buildable: true
    top_pick: false
    source_arxiv: ["2308.00702"]
    source_note: "Holiday Effect of China's Time-Honored Companies"
    en: "Pre-holiday (Spring Festival) calendar tilt — real but low-capacity, a market tilt not a stock selector."
    idea: "Stocks show abnormal returns around festivals; buildable from trade_cal pre-holiday dummies."
    fields: ["trade_cal"]
    factor_expr: "pre-holiday calendar dummy (e.g. N trading days before Spring Festival)"
    novelty: "Lightly covered. Low breadth / low capacity."
    validation: "buildable but park it — a calendar tilt, not a cross-sectional selector."
    caveats: "Low capacity; a timing tilt rather than a stock-selection factor."

