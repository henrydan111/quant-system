<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投研分析部 — 投研情报中心</title><link rel="stylesheet" href="style.css"></head><body>
<div class="wrap">
<div class="banner" id="banner">⚠ NON_EVIDENTIARY</div>
<nav><b>投研情报中心</b><a href="/">热点榜</a><a href="events.html">事件流</a>
<a href="archives.html">研究档案</a><a class="on" href="department.html">投研分析部</a>
<span style="margin-left:auto">股票 <input id="code" size="10" value="688608.SH">
日期 <select id="day"></select> <button onclick="load()">查看</button></span></nav>
<h1>投研分析部 — 各席位 输入 · Prompt · 输出 全透明</h1>
<p class="dim">流水线:确定性卡片渲染 → 三席<b>并行互不可见</b>(反羊群)→ 空头席(同一证据集反驳)
→ 确定性裁判(公式合成,LLM 永不出总分)。每席:职责/模型路由/权重 → Prompt(冻结版本)→
输入(该股卡片原文)→ 输出(模型 JSON,校验前)→ 档案计分(校验+证据独占后)。</p>
<div id="dept"></div>
<footer id="foot"></footer></div>
<script>
const ROLE={
 fund:{label:'基本面分析师',duty:'只读三锚定基本面事实表(值·行业分位·10年分位),对分位打 4 维:盈利质量/成长动能/财务稳健/盈利拐点;禁用记忆、禁自算数字。',card:'fund'},
 tech:{label:'技术面分析师',duty:'只读量价情报包五子卡(全部由代码判定的状态标签+分位),打 5 维+拥挤罚分;不得自行推断卡内未给出的形态。',card:'tech'},
 news:{label:'消息面分析师',duty:'只读检索装配单(direct=本股事件,industry=同业间接事件);打 4 维+3 罚分;间接事件支撑的维度封顶 3 分。',card:'news'},
 bear:{label:'空头分析师(对抗席)',duty:'消费与三席完全相同的卡片+三席最高分主张,专职反驳:每条反驳必须有卡内逐字反证;输出反驳强度/kill switches/盲点。强度≥4 触发裁判折减(该维×0.5)。',card:null}};
async function j(u){const r=await fetch(u);return r.json()}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function scoreTable(rec,weights){
 if(!rec)return '<p class="dim">无原始输出(该席未跑或失败)</p>';
 let h='<table><thead><tr><th>维度</th><th class="num">分</th><th class="num">权重</th><th>证据(逐字)</th></tr></thead><tbody>';
 (rec.factor_scores||[]).forEach(fs=>{
  const w=weights?.[fs.name]??'—';
  h+=`<tr><td>${esc(fs.name)}</td><td class="num">${fs.score_0_5}</td><td class="num dim">${w}</td>
   <td class="dim">${(fs.evidence_spans||[]).map(s=>`「${esc(String(s).slice(0,70))}」`).join('<br>')||'<span class="neg">无证据→不计分</span>'}</td></tr>`});
 (rec.penalty_scores||[]).filter(p=>p.score_0_5>0).forEach(p=>{
  h+=`<tr><td class="neg">罚分 ${esc(p.name)}</td><td class="num neg">-${2*p.score_0_5}</td><td class="num dim">×2</td>
   <td class="dim">${(p.evidence_spans||[]).map(s=>`「${esc(String(s).slice(0,70))}」`).join('<br>')}</td></tr>`});
 h+='</tbody></table>';
 const w=Array.isArray(rec.what_could_weaken)?rec.what_could_weaken:(rec.what_could_weaken?[rec.what_could_weaken]:[]);
 if(w.length)h+=`<p class="dim"><b>什么会证明我错:</b>${esc(w.join(';'))}</p>`;
 return h}
function bearTable(rec){
 if(!rec)return '<p class="dim">无输出</p>';
 let h='<table><thead><tr><th>目标</th><th class="num">强度</th><th>被反驳主张</th><th>反证(逐字)</th><th>理由</th></tr></thead><tbody>';
 (rec.refutations||[]).forEach(r=>{h+=`<tr><td><span class="chip">${esc(r.target_seat)}.${esc(r.target_dim)}</span></td>
  <td class="num ${r.strength_0_5>=4?'neg':''}">${r.strength_0_5}</td><td>${esc(r.claim)}</td>
  <td class="dim">「${esc(String(r.counter_quote||'').slice(0,60))}」</td><td>${esc(r.reason)}</td></tr>`});
 h+='</tbody></table>';
 const ks=Array.isArray(rec.kill_switches)?rec.kill_switches:[];
 if(ks.length)h+='<p><b>Kill switches:</b> '+ks.map(k=>`<span class="chip">${esc(k)}</span>`).join(' ')+'</p>';
 const bs=Array.isArray(rec.blind_spots)?rec.blind_spots:[];
 if(bs.length)h+='<p class="dim"><b>盲点:</b> '+bs.map(esc).join(';')+'</p>';
 return h}
async function load(){
 const code=document.getElementById('code').value.trim().toUpperCase();
 const day=document.getElementById('day').value;
 const d=await j(`/api/dept?code=${code}&date=${day}`);
 document.getElementById('dept').innerHTML='';
 let html=`<h2 style="margin-top:4px">${d.ts_code} ${esc(d.name)} · ${d.date}</h2>`;
 const routing=k=>{const r=k==='bear'?d.routing.bear:d.routing.scoring;
  return `<span class="chip">模型 ${r.model}</span><span class="chip">thinking ${r.thinking?'ON':'OFF'}</span><span class="chip">温度 ${r.temperature}</span>`};
 for(const [k,role] of Object.entries(ROLE)){
  const arch=d.archive?.seats?.[k];
  html+=`<div class="scorebox" style="margin:14px 0">
   <h2 style="margin:0 0 6px">${role.label} ${routing(k)}</h2>
   <p class="dim" style="margin:4px 0">${role.duty}</p>`;
  if(k!=='bear'&&d.weights[k])
   html+=`<p>权重:${Object.entries(d.weights[k]).map(([n,w])=>`<span class="chip">${n}:${w}</span>`).join('')}</p>`;
  html+=`<details><summary style="cursor:pointer"><b>Prompt(冻结 v1)</b></summary>
   <pre style="white-space:pre-wrap;font:12px/1.6 inherit;color:var(--ink2);background:var(--plane);
    border:1px solid var(--grid);border-radius:8px;padding:10px;max-height:320px;overflow:auto">${esc(d.prompts[k])}</pre></details>`;
  if(role.card)
   html+=`<details><summary style="cursor:pointer"><b>输入:该股卡片原文</b></summary>
    <pre style="white-space:pre-wrap;font:12px/1.6 inherit;color:var(--ink2);background:var(--plane);
     border:1px solid var(--grid);border-radius:8px;padding:10px;max-height:320px;overflow:auto">${esc(d.cards[role.card])}</pre></details>`;
  else
   html+=`<p class="dim">输入 = 上方三张卡片全文 + 三席各自最高分的 2 个维度及其证据(seat_claims)</p>`;
  html+=`<p style="margin:8px 0 4px"><b>输出(模型 JSON,校验前)</b></p>`;
  html+=k==='bear'?bearTable(d.raws.bear):scoreTable(d.raws[k],d.weights[k]);
  if(arch&&k!=='bear')
   html+=`<p><b>档案计分(校验+证据独占后):</b>final=${arch.final??'—'} → 折减后 ${arch.adj_final??'—'}
    <span class="dim">(计分维度 ${arch.scored_dims};未接地/复用证据的维度已被裁掉)</span></p>`;
  html+='</div>'}
 const j2=d.archive?.judge;
 html+=`<div class="scorebox"><h2 style="margin:0 0 6px">裁判(确定性代码,非 LLM)</h2>
  <p class="dim">final=clamp(Σ权重×分−2Σ罚分, 0-100);空头强度≥4 → 该维×0.5;
  composite=${Object.entries(d.composite_w).map(([s,w])=>`${w}×${s}`).join(' + ')}
  (evidence_class=research_summary,禁入排序/选股)。</p>`+
  (j2?`<p>composite=${j2.composite} → 空头调整后 ${j2.composite_adj} · 分歧度 ${j2.dispersion}
   ${(j2.divergence_flags||[]).map(f=>`<span class="chip">${f}</span>`).join('')}</p>`:'<p class="dim">该日无档案</p>')+
  `</div><p class="dim">推理链(各席 thinking 独白)在<a href="stock.html?code=${d.ts_code}&date=${d.date}">个股档案页</a>底部的审计视图。</p>`;
 document.getElementById('dept').innerHTML=html}
(async()=>{const m=await j('/api/meta');
 document.getElementById('banner').textContent='⚠ '+m.evidence_class+' — 历史重放,非证据;不得据此调参';
 const sel=document.getElementById('day');
 (m.archive_days.length?m.archive_days:m.days).forEach(d=>{
  const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o)});
 sel.value=(m.archive_days.length?m.archive_days[m.archive_days.length-1]:m.days[m.days.length-1]);
 document.getElementById('foot').textContent=`config=${m.config_hash} · 只读平台(平台不执行任何 LLM 调用)`;
 load()})();
</script></body></html>
