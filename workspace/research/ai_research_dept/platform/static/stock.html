<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>个股档案 — 投研情报中心</title><link rel="stylesheet" href="style.css"></head><body>
<div class="wrap">
<div class="banner" id="banner">⚠ NON_EVIDENTIARY</div>
<nav><b>投研情报中心</b><a href="/">热点榜</a><a href="events.html">事件流</a>
<a href="archives.html">研究档案</a>
<span style="margin-left:auto">日期 <select id="day"></select></span></nav>
<h1 id="title">个股档案</h1>
<div class="cards" id="cards"></div>
<div id="archive"></div>
<h2>基本面事实(三锚定:值 · 行业分位 · 自身10年分位)</h2>
<table id="facts"><thead><tr><th>字段</th><th class="num">值</th><th class="num">行业分位</th>
<th class="num">同业样本</th><th class="num">10年分位</th></tr></thead><tbody></tbody></table>
<h2>量价情报包</h2><div id="pv"></div>
<h2>检索装配(消息面输入;direct=本股,industry=同业间接)</h2>
<table id="retr"><thead><tr><th>通道</th><th>类型</th><th>标题</th><th>极性</th>
<th class="num">相关度</th></tr></thead><tbody></tbody></table>
<footer id="foot"></footer></div>
<script>
const P=new URLSearchParams(location.search);
async function j(u){const r=await fetch(u);return r.json()}
const F={roe_waa:'ROE(加权)%',grossprofit_margin:'毛利率%',netprofit_margin:'净利率%',
 ocf_to_or:'经营现金流/营收',or_yoy:'营收同比%',netprofit_yoy:'净利同比%',
 dt_netprofit_yoy:'扣非净利同比%',basic_eps_yoy:'EPS同比%',debt_to_assets:'资产负债率%',
 current_ratio:'流动比率',assets_turn:'总资产周转',pe_ttm:'PE(TTM)',pb:'PB',
 total_mv:'总市值(万)',turnover_rate:'换手率%'};
const CARDS={A:'趋势形态',B:'量能结构',C:'筹码持仓',D:'主力行为',E:'涨停语言'};
function pc(v){return v===null?'<span class="dim">—</span>':(v*100).toFixed(0)+'%'}
function dirCls(d){return d&&d.includes('利好')?'pos':d&&d.includes('利空')?'neg':'dim'}
async function load(){
 const code=P.get('code'),day=document.getElementById('day').value;
 const s=await j(`/api/stock?code=${code}&date=${day}`);
 document.getElementById('title').textContent=`${s.ts_code} ${s.name} · ${s.date}`;
 document.getElementById('cards').innerHTML=
  `<div class="card"><div class="v">${s.attention??'—'}</div><div class="k">关注度(截面0-100)</div></div>`;
 const A=s.archive, av=document.getElementById('archive'); av.innerHTML='';
 const arr=x=>Array.isArray(x)?x:(x?[x]:[]);   // LLM 偶发字符串代替数组,防御归一
 if(A){
  const SEAT={fund:'基本面席',tech:'技术面席',news:'消息面席'};
  const j2=A.judge||{};
  document.getElementById('cards').innerHTML+=
   `<div class="card"><div class="v">${j2.composite??'—'}</div><div class="k">composite(research_summary)</div></div>
    <div class="card"><div class="v">${j2.composite_adj??'—'}</div><div class="k">空头调整后</div></div>
    <div class="card"><div class="v">${j2.dispersion??'—'}</div><div class="k">分歧度</div></div>`;
  let h='<h2>五席研究档案(LLM 维度分+证据独占+空头对抗;分数为研究摘要,非投资建议)</h2>';
  h+='<table><thead><tr><th>席位</th><th class="num">final</th><th class="num">折减后</th><th>维度分</th><th>什么会证明我错</th></tr></thead><tbody>';
  Object.entries(SEAT).forEach(([k,label])=>{const st=A.seats[k]||{};
   const dims=Object.entries(st.dims||{}).map(([d,v])=>`<span class="chip">${d}:${v}</span>`).join('');
   h+=`<tr><td>${label}${st.error?' <span class="neg">ERR</span>':''}</td>
    <td class="num">${st.final??'—'}</td><td class="num">${st.adj_final??'—'}</td>
    <td>${dims}</td><td class="dim">${arr(st.what_could_weaken).join(';')}</td></tr>`});
  h+='</tbody></table>';
  const b=A.bear||{};
  h+='<h2>空头对抗</h2>';
  if((b.refutations||[]).length){
   h+='<table><thead><tr><th>目标</th><th class="num">强度</th><th>被反驳主张</th><th>反证(逐字)</th><th>理由</th></tr></thead><tbody>';
   b.refutations.forEach(r=>{h+=`<tr><td><span class="chip">${r.target_seat}.${r.target_dim}</span></td>
    <td class="num ${r.strength_0_5>=4?'neg':''}">${r.strength_0_5}</td><td>${r.claim||''}</td>
    <td class="dim">「${(r.counter_quote||'').slice(0,60)}」</td><td>${r.reason||''}</td></tr>`});
   h+='</tbody></table>';}
  if(arr(b.kill_switches).length)
   h+='<p><b>Kill switches:</b> '+arr(b.kill_switches).map(k=>`<span class="chip">${k}</span>`).join(' ')+'</p>';
  if(arr(b.blind_spots).length)
   h+='<p class="dim"><b>盲点:</b> '+arr(b.blind_spots).join(';')+'</p>';
  if(arr(j2.divergence_flags).length)
   h+='<p><b>背离旗:</b> '+arr(j2.divergence_flags).map(f=>`<span class="chip">${f}</span>`).join(' ')+'</p>';
  h+=`<h2>推理链(审计视图)</h2>
   <p class="dim">⚠ 以下为各席 LLM 的原始推理独白(thinking 输出)——未经证据校验,不构成档案内容,
   不得作为任何判断依据;仅供审计"分数是怎么想出来的"。</p><div id="reasoning"></div>`;
  av.innerHTML=h;
  fetch(`/api/reasoning?code=${code}&date=${day}`).then(r=>r.json()).then(rs=>{
   const SEAT2={fund:'基本面席',tech:'技术面席',news:'消息面席',bear:'空头席'};
   document.getElementById('reasoning').innerHTML=Object.entries(SEAT2)
    .filter(([k])=>rs[k])
    .map(([k,label])=>`<details style="margin:6px 0"><summary style="cursor:pointer">
      ${label} 推理链(${rs[k].length} 字)</summary>
      <pre style="white-space:pre-wrap;font:12px/1.6 inherit;color:var(--ink2);
       background:var(--surface);border:1px solid var(--grid);border-radius:8px;
       padding:10px 14px;max-height:400px;overflow:auto">${rs[k]
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre></details>`).join('')});
 } else {
  av.innerHTML='<p class="dim">该日无研究档案(分析师链未跑此日)</p>';
 }
 const fb=document.querySelector('#facts tbody');fb.innerHTML='';
 s.facts.forEach(f=>{const tr=document.createElement('tr');
  tr.innerHTML=`<td>${F[f.field]||f.field}</td><td class="num">${f.value?.toLocaleString?.()??f.value}</td>
   <td class="num">${pc(f.industry_pctl)}</td>
   <td class="num dim">${f.industry_n}${f.scope==='market_fallback'?' (全市场)':''}</td>
   <td class="num">${pc(f.hist_pctl)}</td>`;fb.appendChild(tr)});
 const pv=document.getElementById('pv');pv.innerHTML='';
 Object.entries(CARDS).forEach(([k,label])=>{
  const items=s.pv.filter(x=>x.subcard===k);if(!items.length)return;
  const h=document.createElement('h2');h.textContent=label;h.style.fontSize='13px';
  const t=document.createElement('table');
  t.innerHTML='<tbody>'+items.map(x=>
   `<tr><td>${x.item}</td><td class="num">${x.value??''}</td>
    <td>${x.state?`<span class="chip">${x.state}</span>`:''}</td>
    <td class="num dim">${x.pctl!==null?'分位'+(x.pctl*100).toFixed(0)+'%':''}</td></tr>`).join('')+'</tbody>';
  pv.appendChild(h);pv.appendChild(t)});
 const rb=document.querySelector('#retr tbody');rb.innerHTML='';
 s.retrieval.forEach(r=>{const tr=document.createElement('tr');
  tr.innerHTML=`<td><span class="chip">${r.channel}</span></td><td class="dim">${r.type}</td>
   <td>${r.title}</td><td class="${dirCls(r.direction)}">${r.direction}</td>
   <td class="num">${r.relevance.toFixed(3)}</td>`;rb.appendChild(tr)})}
(async()=>{const m=await j('/api/meta');
 document.getElementById('banner').textContent='⚠ '+m.evidence_class+' — 历史重放,非证据';
 const sel=document.getElementById('day');
 m.days.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o)});
 sel.value=P.get('date')||m.days[m.days.length-1];sel.onchange=load;
 document.getElementById('foot').textContent=`config=${m.config_hash} · snapshot=${m.snapshot} · 只读平台`;
 load()})();
</script></body></html>
