# Recovery endpoint contracts (GPT recovery-review M3 + re-review #3 M2 — the §6.1 "read the interface
# doc BEFORE fetching" gate, made fetch-blocking). SCHEMA MATCHES the validator's CONTRACT_REQUIRED
# exactly (coordinator `contract_errors`) — one source of truth, no scaffold/validator drift. A leg is
# BLOCKED until every one of its endpoints has ALL keys non-placeholder with a HUMAN review timestamp.
# `doc_path` resolves under Tushare数据接口/content/ (traversal/reparse-rejected); `doc_sha256` pins the
# reviewed doc bytes. NOTHING here is pre-signed — placeholder values (incl. list elements like
# ["x","x"]) are rejected. Contracts are signed BEFORE that endpoint's adapter/partition logic (§8).
#
# Required keys per endpoint (validator schema):
#   doc_path        : "Tushare数据接口/content/<doc_id>_<名称>.md"
#   doc_id          : the interface doc id; MUST equal the doc's own `doc_id=` header AND the
#                     doc must declare `接口：<this endpoint>` (or its non-VIP base)
#   doc_sha256      : sha256 of the doc file actually read
#   required_fields : [real column names; >=2; no placeholders] — must be a subset of the doc's field list
#   natural_key     : [row-identity columns; no placeholders]
#   pagination      : human prose (kept for the reviewer; NOT machine-authoritative)
#   pagination_spec : TYPED + machine-compared against every frozen ledger request:
#                     {mode: single_page|offset_paged, page_limit: int,
#                      offset_param: <name>   # required when offset_paged}
#                     single_page => page_limit 0; offset_paged => page_limit > 0 (the doc's cap)
#   request_population : TYPED + EXECUTABLE + REQUEST-SET-PINNED. You sign a resolver the code RUNS,
#                     its bounds, and the sha256 of the COMPLETE REQUESTS that resolve. Not a member
#                     list: an unsigned report_type / range bound / filter is an UNSIGNED REQUEST even
#                     when its primary axis matches (a plan of Sundays passed the prose version; a
#                     report_type=999 passed the member-set version).
#                       {resolver: trade_cal_open_sessions   # -> {trade_date}          per session
#                               | stock_basic_codes          # -> {ts_code}             per stock
#                               | stock_basic_ranges         # -> {ts_code,start_date,end_date}
#                               | index_code_ranges          # -> {ts_code,start_date,end_date}
#                               | calendar_months            # -> {month}
#                               | report_rc_month_ranges     # -> {start_date,end_date} per month
#                               | quarter_end_dates          # -> {end_date}   (the quarter, as end_date)
#                               | year_ranges                # -> {start_date,end_date} per year
#                               | weekly_friday_end_dates    # -> {end_date}   (each weekly Friday)
#                               | report_periods             # -> {period}
#                               | report_periods_x_types,    # -> {period,report_type}  (Cartesian)
#                        bounds: {start, end, exchange, reference_sha256}      # sessions
#                              | {list_status, reference_sha256}               # per-stock
#                              | {list_status, start_date, end_date, reference_sha256}   # stock ranges
#                              | {codes: [...], start_date, end_date}          # index legs
#                              | {start, end, report_types: ["2","3"]}         # direct-quarter
#                              | {start, end}                                  # months / periods /
#                              #   quarter end_dates / year ranges / weekly Fridays
#                              | {periods: [...], report_types: [...]}         # EXPLICIT signed periods
#                        expected_set_sha256: <sha256 over every param of every resolved request>}
#                     * reference_sha256 PINS the reference bytes the population derives from
#                       (trade_cal / stock_basic). Resolving against LIVE reference data would force
#                       re-signing on every calendar or listing refresh; pinning makes the re-sign an
#                       explicit, visible decision instead.
#                     * bounds.periods is an EXPLICIT signed list — legacy Tushare indicator history
#                       contains NON-quarter-end periods (see data/data_tracker.md), which a generated
#                       quarter calendar cannot describe.
#                     * report_types must be signed explicitly (the direct-quarter recipe uses 2 and 3).
#                     * The resolver must BELONG TO THIS ENDPOINT (checked against its own matrix rows
#                       at SIGN-OFF, not deferred to plan time). An endpoint with NO binding is a
#                       sign-off ERROR — an unbound endpoint must never be signable. An empty
#                       resolution refuses.
#                     * The frozen plan is compared to the resolved requests EXACTLY (asked == expected,
#                       whole requests both sides): a MISSING request is an incomplete recovery, an
#                       EXTRA one is a request nobody signed. A resumed run keeps the ORIGINAL full
#                       frozen plan and lets the ledger pick what is still pending — a smaller plan must
#                       never masquerade as a resume.
#   rate_limit      : from the doc (积分/每分钟限次)
#   cadence         : from the doc
#   pit_anchors     : nominal-vs-visible date anchoring (★ create_time/ann_date/f_ann_date/report_date)
#   empty_policy    : dense_refuse | sparse_canary
#   reviewed_by     : human identity (non-placeholder)
#   reviewed_at     : ISO-8601, timezone-aware, not in the future
#
# (Every endpoint below is UNSIGNED — an empty mapping. `--plan` exits nonzero while any remain.)
# The key set here MUST equal the matrix's source-endpoint union (assert via `--plan`:
# matrix_source_endpoints() == yaml keys; a GAP or ORPHAN blocks). Reconciled endpoints (GPT M2):
#   daily_basic + adj_factor : SEPARATE source endpoints merged into the A01 market/daily output
#   forecast (NOT forecast_vip): the live path is pro.forecast per-stock (fetchers.__init__ fetch_forecast)
#   income/balancesheet/cashflow : pro.* STANDARD; income_vip/cashflow_vip = the direct-quarter path only
