daily_basic: {}      # A01 source endpoint (valuation join into market/daily), distinct from daily
adj_factor: {}       # A01 source endpoint (adj factors join into market/daily), distinct from daily
index_daily: {}
income: {}            # NOTE: FundamentalsInitializer.download_fundamentals uses pro.income (NOT income_vip)
balancesheet: {}      # NOTE: uses pro.balancesheet (NOT balancesheet_vip)
income_vip: {}        # direct-quarter path (fetch_quarterly_statements)
cashflow_vip: {}
forecast: {}          # RECONCILED: live path is pro.forecast per-stock (was mislabelled forecast_vip)
